spring:
  application:
    name: idea-forge-backend

  # Make Redis optional - won't crash if unavailable
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  datasource:
    url: ${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SUPABASE_DB_USER:postgres}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      initialization-fail-timeout: -1  # Don't fail if DB unavailable at startup

  jpa:
    hibernate:
      ddl-auto: none  # Don't modify Supabase schema
    show-sql: ${SHOW_SQL:false}
    open-in-view: false  # Prevent lazy loading issues
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          time_zone: UTC
          lob:
            non_contextual_creation: true  # Prevent LOB errors
        temp:
          use_jdbc_metadata_defaults: false  # Don't query DB metadata at startup

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 60000ms
      connect-timeout: 5000ms  # Fail fast if Redis unavailable
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
        shutdown-timeout: 100ms  # Quick shutdown

# Tavily web-search (optional — analysis works without it)
tavily:
  api:
    key: ${TAVILY_API_KEY:}   # Leave blank to disable web search enrichment

# Application-specific configuration
app:
  openai:
    api-key: ${OPENAI_API_KEY}  # REQUIRED - No fallback, must be set in env
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    timeout: ${OPENAI_TIMEOUT:30000}
    max-retries: 3

  supabase:
    url: ${SUPABASE_URL:http://localhost:54321}
    jwt-secret: ${SUPABASE_JWT_SECRET}  # REQUIRED - No fallback, must be set in .env
    anon-key: ${SUPABASE_ANON_KEY}  # REQUIRED - No fallback, must be set in .env

  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    ai-analyze: ${RATE_LIMIT_AI_ANALYZE:10}      # per hour
    ai-generate: ${RATE_LIMIT_AI_GENERATE:5}     # per hour
    ai-chat: ${RATE_LIMIT_AI_CHAT:50}            # per hour
    idea-create: ${RATE_LIMIT_IDEA_CREATE:20}    # per hour
    idea-update: ${RATE_LIMIT_IDEA_UPDATE:50}    # per hour
    profile-update: ${RATE_LIMIT_PROFILE_UPDATE:10}  # per hour
    global: ${RATE_LIMIT_GLOBAL:100}              # per minute

  cors:
    allowed-origins: ${FRONTEND_URL:https://motif-website-master.vercel.app,http://localhost:5173,http://localhost:3000}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH
    allowed-headers: "*"
    exposed-headers: Authorization,Content-Type
    allow-credentials: true
    max-age: 3600

  security:
    jwt-expiration: 86400000  # 24 hours in milliseconds
    refresh-token-expiration: 604800000  # 7 days

# Server configuration
server:
  port: ${PORT:8080}
  address: 0.0.0.0  # Bind to all interfaces (required for Docker)
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  servlet:
    context-path: /
    session:
      timeout: 30m

# Logging configuration
logging:
  level:
    root: INFO
    com.motif.ideaforge: ${LOG_LEVEL:DEBUG}
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: ${SQL_LOG_LEVEL:INFO}
    org.hibernate.type.descriptor.sql.BasicBinder: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:logs/application.log}
    max-size: 10MB
    max-history: 30

# Actuator endpoints (for health checks)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true  # Enable liveness and readiness probes
  health:
    redis:
      enabled: false  # Don't fail health check if Redis is unavailable
    db:
      enabled: false  # Don't fail health check if DB is temporarily unavailable
    defaults:
      enabled: true  # Only use default health indicators

# SpringDoc OpenAPI (Swagger) configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:true}
    operationsSorter: method
    tagsSorter: alpha
  show-actuator: false
